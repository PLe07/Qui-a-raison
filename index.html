<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PickMe! Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 400px;
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 5px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status {
            font-size: 0.7rem;
            color: #4ade80;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        textarea {
            width: 100%;
            height: 150px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 1.2rem;
            color: white;
            font-size: 1rem;
            resize: none;
            box-sizing: border-box;
            transition: all 0.3s;
            margin-bottom: 1rem;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 1.1rem;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        button:active { transform: scale(0.98); }

        #result-container {
            margin-top: 1.5rem;
            min-height: 70px;
        }

        .winner-display {
            font-size: 1.6rem;
            font-weight: 800;
            padding: 1rem;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.08);
            display: none;
            animation: spring 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes spring {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>PickMe!</h1>
        <div class="status">● Sauvegarde auto active</div>
        
        <textarea id="names" oninput="saveNames()" placeholder="Ex: Lucas, Sarah, Julie..."></textarea>
        
        <button onclick="pickWinner()">Lancer le tirage</button>

        <div id="result-container">
            <div id="winnerDisplay" class="winner-display"></div>
        </div>
    </div>

    <script>
        // 1. Charger les noms au démarrage
        window.onload = () => {
            const saved = localStorage.getItem('maListeDeNoms');
            if (saved) {
                document.getElementById('names').value = saved;
            }
        };

        // 2. Sauvegarder à chaque modification
        function saveNames() {
            const val = document.getElementById('names').value;
            localStorage.setItem('maListeDeNoms', val);
        }

        // 3. Le tirage au sort
        function pickWinner() {
            const input = document.getElementById('names').value;
            const display = document.getElementById('winnerDisplay');
            const list = input.split(/[,\n]/).map(n => n.trim()).filter(n => n !== "");

            if (list.length < 2) {
                alert("Il faut au moins 2 participants !");
                return;
            }

            display.style.display = "block";
            display.innerText = "🎲 Tirage...";
            display.style.background = "rgba(255, 255, 255, 0.08)";

            setTimeout(() => {
                const winner = list[Math.floor(Math.random() * list.length)];
                display.innerText = "🏆 " + winner;
                display.style.background = "rgba(74, 222, 128, 0.2)";
                
                // 4. Lancement des confettis !
                confetti({
                    particleCount: 150,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: ['#6366f1', '#a855f7', '#4ade80']
                });
            }, 800);
        }
    </script>
</body>
</html>
