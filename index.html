<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Décideur Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-bg: #f2f2f7;
            --glass: rgba(255, 255, 255, 0.7);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--ios-bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(100, 148, 255, 0.2) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.2) 0px, transparent 50%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #000;
        }

        .iphone-card {
            width: 90%;
            max-width: 380px;
            background: var(--glass);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.3);
            text-align: center;
        }

        h1 {
            font-weight: 700;
            font-size: 24px;
            letter-spacing: -0.5px;
            margin-bottom: 20px;
        }

        .input-group {
            background: rgba(0, 0, 0, 0.05);
            border-radius: 18px;
            padding: 15px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 17px;
            font-family: inherit;
            resize: none;
            height: 120px;
            outline: none;
            color: #1c1c1e;
        }

        .btn-main {
            background: var(--ios-blue);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-main:active {
            transform: scale(0.96);
            filter: brightness(0.9);
        }

        #result-box {
            margin-top: 25px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .winner-text {
            font-size: 28px;
            font-weight: 800;
            color: #1c1c1e;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .winner-text.show {
            opacity: 1;
            transform: translateY(0);
        }

        .clear-btn {
            background: none;
            border: none;
            color: var(--ios-blue);
            font-size: 14px;
            margin-top: 15px;
            cursor: pointer;
            padding: 10px;
        }
    </style>
</head>
<body>

    <div class="iphone-card">
        <h1>Le Décideur</h1>
        
        <div class="input-group">
            <textarea id="namesList" oninput="save()" placeholder="Noms (ex: Lise, Quentin, Léa...)"></textarea>
        </div>

        <button class="btn-main" onclick="roll()">Tirer au sort</button>
        
        <div id="result-box">
            <div id="winner" class="winner-text"></div>
        </div>

        <button class="clear-btn" onclick="clearAll()">Effacer la liste</button>
    </div>

    <script>
        const input = document.getElementById('namesList');
        const display = document.getElementById('winner');

        // Charger au démarrage
        window.onload = () => {
            input.value = localStorage.getItem('list') || "";
        };

        function save() {
            localStorage.setItem('list', input.value);
        }

        function clearAll() {
            if(confirm("Effacer tous les noms ?")) {
                input.value = "";
                save();
                display.classList.remove('show');
            }
        }

        function roll() {
            const list = input.value.split(/[,\n]/).map(n => n.trim()).filter(n => n !== "");
            
            if (list.length < 2) {
                alert("Ajoute au moins 2 personnes !");
                return;
            }

            // Animation de chargement
            display.classList.remove('show');
            display.innerText = "⏳ Tirage...";
            display.classList.add('show');

            setTimeout(() => {
                const winner = list[Math.floor(Math.random() * list.length)];
                display.classList.remove('show');
                
                setTimeout(() => {
                    display.innerText = "✨ " + winner;
                    display.classList.add('show');
                    
                    confetti({
                        particleCount: 100,
                        spread: 60,
                        origin: { y: 0.7 },
                        colors: ['#007AFF', '#5856D6', '#FF2D55']
                    });
                }, 50);
            }, 600);
        }
    </script>
</body>
</html>
