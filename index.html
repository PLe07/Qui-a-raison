<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LE DÉCIDEUR</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --accent: #00f2ff;
            --accent-pink: #7000ff;
            --bg: #050505;
            --card-bg: rgba(20, 20, 20, 0.8);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .glow-bg {
            position: absolute;
            width: 300px; height: 300px;
            background: var(--accent);
            filter: blur(120px);
            border-radius: 50%;
            opacity: 0.15;
            z-index: -1;
            animation: move 10s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-50%, -50%); }
            to { transform: translate(50%, 50%); }
        }

        .app-container {
            width: 90%;
            max-width: 400px;
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 {
            font-weight: 800;
            font-size: 32px;
            letter-spacing: -1.5px;
            margin: 0 0 10px 0;
            background: linear-gradient(to bottom, #fff, #666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p { color: #666; font-size: 14px; margin-bottom: 30px; }

        .input-wrapper {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.06);
        }

        textarea {
            width: 100%;
            border: none;
            background: transparent;
            color: #fff;
            font-size: 18px;
            font-family: inherit;
            resize: none;
            height: 100px;
            outline: none;
            text-align: center;
        }

        .btn-trigger {
            margin-top: 30px;
            background: #fff;
            color: #000;
            border: none;
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .btn-trigger:active { transform: scale(0.92); }

        #result-display {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
        }

        .winner-name {
            font-size: 36px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #fff, var(--accent), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 2s linear infinite, pop 0.4s ease-out;
        }

        @keyframes shine { to { background-position: 200% center; } }
        @keyframes pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .footer-tools {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .tool-link {
            color: #444;
            font-size: 12px;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: none;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="glow-bg"></div>

    <div class="app-container">
        <h1>QUI AURA RAISON ?</h1>
        <p>TAP TO DECIDE YOUR FATE</p>
        
        <div class="input-wrapper">
            <textarea id="list" oninput="save()" placeholder="Noms ici..."></textarea>
        </div>

        <button class="btn-trigger" onclick="run()">DÉCIDER MAINTENANT</button>
        
        <div id="result-display"></div>

        <div class="footer-tools">
            <button class="tool-link" onclick="clearList()">Reset</button>
        </div>
    </div>

    <script>
        const textarea = document.getElementById('list');
        const resultDiv = document.getElementById('result-display');

        window.onload = () => {
            textarea.value = localStorage.getItem('ultra-list') || "";
        }

        function save() {
            localStorage.setItem('ultra-list', textarea.value);
        }

        function clearList() {
            if(confirm("Tout effacer ?")) {
                textarea.value = "";
                save();
                resultDiv.innerHTML = "";
            }
        }

        function run() {
            const names = textarea.value.split(/[,\n]/).map(n => n.trim()).filter(n => n !== "");
            if (names.length < 2) return;

            let count = 0;
            const interval = setInterval(() => {
                resultDiv.innerHTML = `<span style="color:#444; font-size: 20px;">${names[Math.floor(Math.random() * names.length)]}</span>`;
                count++;
                if (count > 10) {
                    clearInterval(interval);
                    showFinal(names);
                }
            }, 50);
        }

        function showFinal(names) {
            // Logique de triche : on cherche les noms avec accents
            const favNames = names.filter(n => /[é]/.test(n.toLowerCase()));
            const otherNames = names.filter(n => !/[é]/.test(n.toLowerCase()));
            
            let final;
            // Si des noms avec accents existent, on applique le 75% de chance
            if (favNames.length > 0 && Math.random() < 0.57) {
                final = favNames[Math.floor(Math.random() * favNames.length)];
            } else {
                final = names[Math.floor(Math.random() * names.length)];
            }

            resultDiv.innerHTML = `<div class="winner-name">${final}</div>`;
            
            confetti({
                particleCount: 150,
                spread: 100,
                origin: { y: 0.8 },
                colors: ['#00f2ff', '#ffffff', '#7000ff']
            });
        }
    </script>
</body>
</html>
